<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firewall Auto-Fill</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; width: 300px; text-align: center; }
        img { width: 100px; height: auto; margin-bottom: 10px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background: green; color: white; border: none; cursor: pointer; }
        button:hover { background: darkgreen; }
    </style>
</head>
<body>
    <h2>Auto-Fill Settings</h2>
    <form id="credentialsForm">
        <input type="text" id="username" placeholder="Enter Username" required>
        <input type="password" id="password" placeholder="Enter Password" required>
        <button type="submit">Save Credentials</button>
    </form>
    <p id="message" style="color:green;"></p>
    <script src="popup.js"></script>
</body>
</html>
